<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" id="status-bar-meta" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="톡다리">
<meta name="theme-color" id="theme-color-meta" content="#0d0d1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>톡다리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d0d1a;--bg2:#13132a;--bg3:#1a1a35;--accent:#7c3aed;--accent2:#a78bfa;--pink:#ec4899;--text:#f0f0ff;--text2:#9999bb;--text3:#6666aa;--bubble-ai:#1e1e3f;--bubble-user:#5b21b6;--border:rgba(124,58,237,0.2);--green:#22c55e;--divider:rgba(255,255,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text)}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
#splash h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#splash p{font-size:.85rem;color:var(--text3)}
.splash-char{font-size:5rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.auth-wrap{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;z-index:100;gap:1rem;overflow-y:auto}
.auth-wrap.show{display:flex}
.auth-title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-sub{font-size:.82rem;color:var(--text3);text-align:center}
.auth-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.4rem;display:flex;flex-direction:column;gap:12px}
.auth-label{font-size:.72rem;color:var(--text3);font-weight:600}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;max-width:360px;padding:1rem;background:linear-gradient(135deg,var(--accent),var(--pink));border:none;border-radius:14px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.auth-btn:active{opacity:.85}
.auth-switch{font-size:.82rem;color:var(--text3);cursor:pointer;text-align:center}
.auth-switch span{color:var(--accent2);text-decoration:underline}
.auth-error{font-size:.78rem;color:#f87171;text-align:center;min-height:18px}
#matching{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1rem;z-index:100;gap:1.2rem;overflow-y:auto}
#matching.show{display:flex}
.match-progress{display:flex;gap:8px;justify-content:center}
.match-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
.match-dot.active{background:var(--accent2)}
.match-scene{font-size:.82rem;color:var(--text3);text-align:center;padding:.6rem .8rem;background:var(--bg2);border-radius:12px;max-width:340px;width:100%;line-height:1.6;font-style:italic}
.match-question{font-size:1.05rem;font-weight:700;text-align:center;max-width:340px;line-height:1.6}
.match-choices{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.match-choice{padding:1rem 1.2rem;background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;color:var(--text);font-size:.88rem;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;transition:all .15s;line-height:1.5}
.match-choice.selected{border-color:var(--accent);background:rgba(124,58,237,.15);color:var(--accent2)}
.match-result{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:340px;width:100%}
.match-char-big{font-size:6rem;animation:pulse 2s infinite}
.match-char-type{font-size:.78rem;color:var(--accent2);font-weight:600;letter-spacing:.05em}
.match-char-name{font-size:1.6rem;font-weight:700}
.match-char-desc{font-size:.85rem;color:var(--text2);line-height:1.7}
#app{position:fixed;inset:0;display:none;flex-direction:column}
#app.show{display:flex}
#chat-screen{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);z-index:50}
#chat-screen.active{display:flex}
#tab-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.tab-screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.tab-screen.active{display:flex}
.app-header{background:var(--bg2);border-bottom:1px solid var(--divider);padding:.8rem 1rem;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-title{font-size:1.05rem;font-weight:700}
.hbtn{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:6px;border-radius:8px}
.header-actions{margin-left:auto;display:flex;gap:2px}
#home-screen{background:var(--bg);overflow-y:auto}
.home-inner{display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem 2rem;gap:1rem}
.char-stage{width:200px;height:200px;border-radius:24px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;margin:.5rem 0;transition:all .5s;overflow:hidden}
.char-emoji{font-size:5rem;transition:all .5s}
.char-aura{position:absolute;inset:-8px;border-radius:50%;border:2px solid transparent;animation:aura 3s infinite}
@keyframes aura{0%,100%{border-color:rgba(124,58,237,.2);transform:scale(1)}50%{border-color:rgba(167,139,250,.5);transform:scale(1.04)}}
.char-name-disp{font-size:1.3rem;font-weight:700}
.char-type-disp{font-size:.78rem;color:var(--accent2);font-weight:600}
.char-level-disp{font-size:.78rem;color:var(--text3)}
.bond-wrap{width:100%;max-width:300px}
.bond-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3);margin-bottom:6px}
.bond-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bond-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--pink));border-radius:4px;transition:width 1s}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:300px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.8rem;text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--accent2)}
.stat-lbl{font-size:.68rem;color:var(--text3);margin-top:2px}
.today-msg{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.9rem 1.2rem;width:100%;max-width:300px;display:flex;align-items:center;gap:10px}
.today-icon{font-size:1.8rem}
.today-text{font-size:.83rem;color:var(--text2);flex:1;line-height:1.5}
.chat-start-btn{width:100%;max-width:300px;padding:1rem;background:linear-gradient(135deg,var(--accent),var(--pink));border:none;border-radius:16px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.chat-start-btn:active{opacity:.85}
.chat-hdr-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative}
.online-dot{width:9px;height:9px;background:var(--green);border-radius:50%;position:absolute;bottom:0;right:0;border:2px solid var(--bg2)}
.chat-hdr-name{font-weight:700;font-size:.95rem}
.chat-hdr-status{font-size:.68rem;color:var(--green)}
#chat-messages{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:4px;background:var(--bg)}
#chat-messages::-webkit-scrollbar{width:3px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;align-self:flex-start}
.msg-col{display:flex;flex-direction:column;gap:2px;max-width:75%}
.msg-row.user .msg-col{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.6;word-break:break-word}
.bubble.ai{background:var(--bubble-ai);color:var(--text);border-top-left-radius:4px}
.bubble.user{background:var(--bubble-user);color:#fff;border-top-right-radius:4px}
.bubble img{max-width:100%;border-radius:10px;display:block;max-height:200px}
.msg-time{font-size:.6rem;color:var(--text3);white-space:nowrap}
.date-div{text-align:center;font-size:.7rem;color:var(--text3);margin:8px 0;padding:0 40px;position:relative}
.date-div::before,.date-div::after{content:'';position:absolute;top:50%;height:1px;background:var(--divider);width:30%}
.date-div::before{left:0}.date-div::after{right:0}
.typing-bubble{background:var(--bubble-ai);border-radius:18px;border-top-left-radius:4px;padding:12px 16px;display:inline-flex;gap:4px;align-items:center}
.tdot{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:tdot 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
.input-bar{background:var(--bg2);border-top:1px solid var(--divider);padding:.5rem .75rem;display:flex;align-items:flex-end;gap:5px;padding-bottom:max(.5rem,env(safe-area-inset-bottom));flex-shrink:0;box-sizing:border-box;width:100%}
.input-wrap{position:relative;flex:1;display:flex;flex-direction:column;min-width:0}
.input-bar textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:8px 12px;color:var(--text);font-size:.9rem;outline:none;resize:none;max-height:120px;min-height:38px;font-family:'Noto Sans KR',sans-serif;line-height:1.5;transition:border-color .2s;width:100%}
.input-bar textarea:focus{border-color:var(--accent)}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
.send-btn:active{opacity:.85}
.attach-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emoji-panel{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border-top:1px solid var(--divider);padding:8px;z-index:20}
.emoji-panel.show{display:block}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;max-height:140px;overflow-y:auto}
.emoji-btn{font-size:1.5rem;padding:5px;border-radius:8px;cursor:pointer;background:none;border:none;line-height:1}
.img-preview{position:relative;display:inline-block;margin-bottom:6px}
.img-preview img{max-height:80px;border-radius:10px;display:block}
.img-preview-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#f87171;border-radius:50%;border:none;color:#fff;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#chat-screen.trash .app-header{background:#1a0505;border-bottom-color:rgba(239,68,68,.3)}
#chat-screen.trash #chat-messages{background:#0d0505}
#chat-screen.trash .input-bar{background:#1a0505;border-top-color:rgba(239,68,68,.25)}
#settings-screen{background:var(--bg);overflow-y:auto}
.settings-body{padding:.75rem;display:flex;flex-direction:column;gap:12px}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1rem;display:flex;flex-direction:column;gap:12px}
.settings-section h3{font-size:.75rem;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-label{font-size:.88rem}
.toggle{width:48px;height:27px;background:var(--bg3);border-radius:14px;border:1px solid var(--border);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{width:21px;height:21px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s}
.toggle.on .toggle-thumb{transform:translateX(21px)}
.settings-info{font-size:.78rem;color:var(--text3);text-align:center;padding:.5rem 0}
.logout-btn{width:100%;padding:.9rem;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:12px;color:#f87171;font-size:.9rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.danger-btn{width:100%;padding:.9rem;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:12px;color:#f87171;font-size:.9rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.prepare-btn{width:100%;padding:.9rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:.9rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.tab-bar{background:var(--bg2);border-top:1px solid var(--divider);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;cursor:pointer;background:none;border:none;gap:3px}
.tab-item .ti{font-size:1.3rem;line-height:1}
.tab-item .tl{font-size:.62rem;color:var(--text3);transition:color .15s}
.tab-item.active .tl{color:var(--accent2);font-weight:700}
.tab-item.active .ti{filter:drop-shadow(0 0 4px var(--accent))}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(30,30,60,.95);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:.82rem;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.lv-glow-2{box-shadow:0 0 25px rgba(124,58,237,.4)}
.lv-glow-3{box-shadow:0 0 35px rgba(167,139,250,.5)}
.lv-glow-4{box-shadow:0 0 45px rgba(236,72,153,.6)}
.lv-glow-5{box-shadow:0 0 55px rgba(236,72,153,.8);animation:glow5 2s infinite}
.lv-glow-6{box-shadow:0 0 70px rgba(255,215,0,.9);animation:glow6 2s infinite}
@keyframes glow6{0%,100%{box-shadow:0 0 70px rgba(255,215,0,.9)}50%{box-shadow:0 0 90px rgba(255,255,255,1)}}
@keyframes glow5{0%,100%{box-shadow:0 0 55px rgba(236,72,153,.8)}50%{box-shadow:0 0 70px rgba(167,139,250,1)}}
</style>
</head>
<body>
<div id="splash">
  <div class="splash-char" id="splash-char">🥚</div>
  <h1>톡다리</h1>
  <p>잠깐만, 불러오는 중...</p>
</div>
<div class="auth-wrap" id="login-screen">
  <div style="font-size:3rem">🌱</div>
  <div class="auth-title">다시 왔구나!</div>
  <div class="auth-sub">이메일이랑 비밀번호 입력해줘</div>
  <div class="auth-box">
    <div><div class="auth-label">이메일</div><input class="auth-input" id="li-email" type="email" placeholder="이메일 입력" autocomplete="email"></div>
    <div><div class="auth-label">비밀번호</div><input class="auth-input" id="li-password" type="password" placeholder="비밀번호" autocomplete="current-password"></div>
    <div class="auth-error" id="li-error"></div>
  </div>
  <button class="auth-btn" onclick="doLogin()">로그인 →</button>
  <div class="auth-switch" onclick="showSignup()">계정이 없어? <span>회원가입</span></div>
</div>
<div class="auth-wrap" id="signup-screen">
  <div style="font-size:3rem">🌱</div>
  <div class="auth-title">톡다리 시작하기</div>
  <div class="auth-sub">나만의 친구를 만들어봐!</div>
  <div class="auth-box">
    <div><div class="auth-label">이름</div><input class="auth-input" id="su-name" type="text" placeholder="홍길동" autocomplete="name"></div>
    <div><div class="auth-label">이메일</div><input class="auth-input" id="su-email" type="email" placeholder="example@email.com" autocomplete="email"></div>
    <div><div class="auth-label">비밀번호 (6자리 이상)</div><input class="auth-input" id="su-password" type="password" placeholder="••••••" autocomplete="new-password"></div>
    <div class="auth-error" id="su-error"></div>
  </div>
  <button class="auth-btn" onclick="doSignup()">가입하기 →</button>
  <div class="auth-switch" onclick="showLogin()">이미 계정이 있어? <span>로그인</span></div>
</div>
<div id="matching">
  <div class="match-progress" id="match-progress"></div>
  <div class="match-question" id="match-q" style="display:none"></div>
  <div class="match-scene" id="match-scene" style="display:none"></div>
  <div class="match-choices" id="match-choices"></div>
  <div class="match-result" id="match-result" style="display:none">
    <div class="match-char-big" id="result-char"></div>
    <div class="match-char-type" id="result-type"></div>
    <div class="match-char-name" id="result-name"></div>
    <div style="font-size:.85rem;color:var(--text3)">가 운명처럼 찾아왔어</div>
    <div class="match-char-desc" id="result-desc"></div>
    <button class="auth-btn" style="max-width:300px;width:100%;margin-top:.5rem" onclick="startWithCharacter()">만나러 가기 →</button>
  </div>
</div>
<div id="app">
  <div id="chat-screen">
    <div class="app-header">
      <button class="hbtn" onclick="goBackToHome()" style="font-size:1.4rem">←</button>
      <div class="chat-hdr-av"><span id="chat-char-icon">🥚</span><div class="online-dot"></div></div>
      <div>
        <div class="chat-hdr-name" id="chat-char-name">친구</div>
        <div class="chat-hdr-status" id="chat-status">온라인</div>
      </div>
      <div class="header-actions">
        <button class="hbtn" onclick="toggleTrash()">💢</button>
      </div>
    </div>
    <div id="chat-messages"></div>
    <div class="input-bar">
      <button class="attach-btn" onclick="document.getElementById('media-input').click()">📷</button>
      <input type="file" id="media-input" accept="image/*,video/*" style="display:none" onchange="handleMedia(event)">
      <div class="input-wrap">
        <div class="emoji-panel" id="emoji-panel"><div class="emoji-grid" id="emoji-grid"></div></div>
        <div id="img-preview-wrap"></div>
        <textarea id="msg-input" placeholder="메시지 입력..." rows="1" oninput="autoResize(this)"></textarea>
      </div>
      <button class="attach-btn" onclick="toggleEmojiPanel()">😊</button>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
  <div id="tab-content">
    <div id="home-screen" class="tab-screen active">
      <div class="app-header">
        <div class="hdr-title">톡다리 🌱</div>
        <div style="margin-left:auto;font-size:.75rem;color:var(--text3)" id="home-username"></div>
      </div>
      <div class="home-inner">
        <div class="char-stage" id="char-stage">
          <div class="char-aura"></div>
          <div id="char-svg-wrap" style="width:140px;height:140px;display:flex;align-items:center;justify-content:center"></div>
        </div>
        <div class="char-name-disp" id="char-name-disp">??</div>
        <div class="char-type-disp" id="char-type-disp"></div>
        <div class="char-level-disp" id="char-level-disp">Lv.1 · 새싹</div>
        <div class="bond-wrap">
          <div class="bond-label"><span>친밀도</span><span id="bond-percent">0%</span></div>
          <div class="bond-bar"><div class="bond-fill" id="bond-fill" style="width:0%"></div></div>
        </div>
        <div class="status-grid">
  <div class="stat-card"><div class="stat-val" id="stat-level">1</div><div class="stat-lbl">레벨</div></div>
  <div class="stat-card"><div class="stat-val" id="stat-mood">😊</div><div class="stat-lbl">오늘 기분</div></div>

  const qEl=document.getElementById('match-q');
  const scEl=document.getElementById('match-scene');
  const chEl=document.getElementById('match-choices');
  if(q.scene){scEl.style.display='block';scEl.textContent=q.scene;qEl.style.display='block';qEl.textContent=q.real_q;}
  else{scEl.style.display='none';qEl.style.display='block';qEl.textContent=q.q;}
  chEl.innerHTML=q.choices.map(c=>`<button class="match-choice" onclick="matchPick('${c.val}',this)">${c.text}</button>`).join('');
}
function matchPick(val,el){
  document.querySelectorAll('.match-choice').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');matchAnswers.push(val);

async function sendFirstMessage(){

  else if(ch.id==='B')msgs=[`...왔구나. 오늘 어때?`,`기다렸어. 밥은 먹었어?`,`${name} 왔어. 오늘 하루 어떻게 보냈어?`];
  else msgs=[`${name}. 왔네. 오늘 뭔 일 있어?`,`어, 왔어? 오늘 생산적이었어?`,`왔어? 생각해볼 거 있는데 들어볼래?`];

let replyTimer = null;
let pendingUserMsgs = [];

async function sendMessage(){
  const ta=document.getElementById('msg-input');
  const text=ta.value.trim();
  if(!text&&!pendingMedia)return;

  document.getElementById('emoji-panel')?.classList.remove('show');

  if(pendingMedia){
    appendMsg('user','',pendingMedia);
    const content=`[미디어] ${text||'파일 보냈어'}`;
    pendingUserMsgs.push(content);
    messages.push({role:'user',content,created_at:new Date().toISOString()});
    await saveMsg('user',content);
    clearMediaPreview();
  }

  if(text){
    ta.value='';ta.style.height='auto';
    appendMsg('user',text);
    pendingUserMsgs.push(text);
    messages.push({role:'user',content:text,created_at:new Date().toISOString()});
    await saveMsg('user',text);
  } else {
    ta.value='';ta.style.height='auto';
  }

  await updateBond();

  // 기존 타이머 초기화 (연속 입력 감지)
  if(replyTimer) clearTimeout(replyTimer);

  // 메시지 길이에 따라 대기 시간 결정
  const totalLength = pendingUserMsgs.join('').length;
  const waitTime = totalLength > 50 ? 4000 : totalLength > 20 ? 2500 : 1500;

  // 입력이 멈추면 대기 후 답장
  replyTimer = setTimeout(async()=>{
    if(isLoading)return;
    pendingUserMsgs = [];
    await callGPT();
  }, waitTime);
}
async function callGPT(){
  if(isLoading)return;isLoading=true;const ch=getChar();
  if(ch&&Math.random()<ch.ignore){
    document.getElementById('chat-status').textContent='읽음';isLoading=false;
    setTimeout(async()=>{
      const typId=showTyping();await new Promise(r=>setTimeout(r,2000));removeTyping(typId);
      const late=['아 미안 딴생각했어','ㅋㅋ깜빡했어 미안','방금 봤어 미안'];
      const rep=late[Math.floor(Math.random()*late.length)];
      appendMsg('ai',rep);messages.push({role:'assistant',content:rep,created_at:new Date().toISOString()});await saveMsg('assistant',rep);
      document.getElementById('chat-status').textContent='온라인';
    },15000+Math.random()*30000);return;
  }
  document.getElementById('chat-status').textContent='입력 중...';const typId=showTyping();
  // 메시지 길이 기반 읽는 시간 계산
const lastMsg=messages.filter(m=>m.role==='user').slice(-3).map(m=>m.content).join('');
const readTime=Math.min(Math.max(lastMsg.length*80, 1500), 8000);
const delay=readTime+Math.random()*2000;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'system',content:buildPrompt()},...messages.slice(-30).map(m=>({role:m.role==='ai'?'assistant':m.role,content:typeof m.content==='string'?m.content:JSON.stringify(m.content)}))]})});
    await new Promise(r=>setTimeout(r,delay));removeTyping(typId);
    if(!resp.ok){appendMsg('ai','앗 오류났어 다시 해봐');}
    else{const data=await resp.json();const reply=data.choices?.[0]?.message?.content?.trim()||'응';appendMsg('ai',reply);messages.push({role:'assistant',content:reply,created_at:new Date().toISOString()});await saveMsg('assistant',reply);}
  }catch(e){removeTyping(typId);appendMsg('ai','인터넷 확인해봐');}
  // 10번 대화마다 자동 다이어리 저장
if(totalMsgs>0 && totalMsgs%10===0) autoSaveDiary();
  isLoading=false;document.getElementById('chat-status').textContent='온라인';
}

function handleMedia(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{pendingMedia=ev.target.result;showMediaPreview(pendingMedia);};reader.readAsDataURL(file);e.target.value='';}
function showMediaPreview(src){const wrap=document.getElementById('img-preview-wrap');if(!wrap)return;wrap.innerHTML=`<div class="img-preview"><img src="${src}"><button class="img-preview-del" onclick="clearMediaPreview()">✕</button></div>`;}
function clearMediaPreview(){pendingMedia=null;const w=document.getElementById('img-preview-wrap');if(w)w.innerHTML='';}

function initEmojiPanel(){const g=document.getElementById('emoji-grid');if(!g)return;g.innerHTML=EMOJIS.map(e=>`<button class="emoji-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('');}

function insertEmoji(e){const ta=document.getElementById('msg-input');if(!ta)return;const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.slice(0,s)+e+ta.value.slice(en);ta.selectionStart=ta.selectionEnd=s+e.length;ta.focus();autoResize(ta);}
document.addEventListener('click',e=>{const p=document.getElementById('emoji-panel');if(!p)return;if(!p.contains(e.target)&&!e.target.closest('.attach-btn'))p.classList.remove('show');});
function fmtContent(text){
  if(!text||typeof text!=='string')return '';

  // 1. 마크다운 표 감지 → HTML 테이블 변환
  if(text.includes('|')){
    const lines=text.split('\n');
    const tableLines=lines.filter(l=>l.trim().startsWith('|'));
    if(tableLines.length>=2){
      let html='';let inTable=false;
      const processedLines=lines.map(line=>{
        if(!line.trim().startsWith('|'))return inTable?(inTable=false,'</table>'):(inTable=false,escFmt(line));
        if(line.match(/^\|[-| ]+\|$/))return '';
        if(!inTable){inTable=true;html='<table style="border-collapse:collapse;width:100%;margin:6px 0;font-size:.82rem">';}
        const cells=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
        return cells.map(c=>`<td style="border:1px solid var(--border);padding:5px 8px;color:var(--text)">${escFmt(c.trim())}</td>`).join('');
      });
      // 표 있으면 테이블로 렌더링
      let result='<table style="border-collapse:collapse;width:100%;margin:6px 0;font-size:.82rem">';
      let isHeader=true;
      lines.forEach(line=>{
        if(!line.trim().startsWith('|'))return;
        if(line.match(/^\|[\s\-|]+\|$/))return;
        const cells=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
        const tag=isHeader?'th':'td';
        const style=isHeader
          ?'border:1px solid var(--border);padding:6px 10px;background:var(--bg3);color:var(--accent2);font-weight:700'
          :'border:1px solid var(--border);padding:5px 8px;color:var(--text)';
        result+=`<tr>${cells.map(c=>`<${tag} style="${style}">${escFmt(c.trim())}</${tag}>`).join('')}</tr>`;
        isHeader=false;
      });
      result+='</table>';
      // 표 외 나머지 텍스트 처리
      const nonTableText=lines.filter(l=>!l.trim().startsWith('|')).join('\n').trim();
      return (nonTableText?fmtPlain(nonTableText)+'<br>':'')+result;
    }
  }

  return fmtPlain(text);
}

function escFmt(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtPlain(text){
  if(!text||typeof text!=='string')return '';
  // 볼드 **text** 처리
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // URL 처리
  const parts=text.split(/(https?:\/\/[^\s<>"]+)/g);
  return parts.map(p=>{
    if(!p.match(/^https?:\/\//))
      return p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    if(/youtube\.com|youtu\.be/i.test(p)){
      const m=p.match(/(?:v=|youtu\.be\/)([^&?/\s]+)/);
      const v=m?m[1]:'';
      return `<a href="${p}" target="_blank" style="color:var(--accent2);text-decoration:underline;word-break:break-all">🎬 ${p}</a>${v?`<br><img src="https://img.youtube.com/vi/${v}/mqdefault.jpg" style="max-width:200px;border-radius:8px;margin-top:4px;cursor:pointer;display:block" onclick="window.open('${p}','_blank')">` : ''}`;
    }
    // 이미지 URL 감지 (.jpg .png .gif .webp)
    if(/\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(p)){
      return `<img src="${p}" style="max-width:100%;border-radius:10px;margin-top:4px;display:block;cursor:pointer" onclick="window.open('${p}','_blank')" onerror="this.style.display='none'"><br><a href="${p}" target="_blank" style="color:var(--accent2);text-decoration:underline;font-size:.8rem">🖼 이미지 열기</a>`;
    }
    return `<a href="${p}" target="_blank" style="color:var(--accent2);text-decoration:underline;word-break:break-all">🔗 ${p}</a>`;
  }).join('');
}
async function toggleNotif(el){
  el.classList.toggle('on');
  if(el.classList.contains('on')){
    await requestNotifPermission();
  } else {
    showToast('알림을 껐어. 다시 켜면 알림 와!');
  }
}
async function requestNotifPermission(){
  if(!('Notification' in window)){showToast('이 브라우저는 알림을 지원하지 않아');return;}
  if(!('serviceWorker' in navigator)){showToast('서비스워커 미지원 브라우저야');return;}

  const perm = await Notification.requestPermission();
  if(perm === 'denied'){showToast('알림 권한이 차단됐어. 브라우저 설정에서 허용해줘!');return;}
  if(perm !== 'granted'){showToast('알림 권한이 필요해!');return;}

  try{
    const reg = await navigator.serviceWorker.ready;
    // 기존 구독 있으면 해제 후 재구독
    const existing = await reg.pushManager.getSubscription();
    if(existing) await existing.unsubscribe();

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToU8(VAPID_PUB)
    });

    const r = await fetch('/api/subscribe',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userId:currentUser.id, subscription:sub})
    });

    if(r.ok){
      showToast('알림 설정 완료! 이제 선톡도 받을 수 있어 📱');
      // 즉시 테스트 알림
      setTimeout(()=>{
        new Notification(charData?.char_name||'톡다리',{
          body:'알림 설정됐어! 이제 내가 먼저 톡 할게 😊',
          icon:'/icon.png'
        });
      }, 1000);
    } else {
      showToast('알림 등록 실패 ㅠ 다시 시도해봐');
    }
  }catch(e){
    console.error(e);
    showToast('알림 설정 중 오류났어: '+e.message);
  }
}
function urlB64ToU8(b64){const p='='.repeat((4-b64.length%4)%4);const b=(b64+p).replace(/-/g,'+').replace(/_/g,'/');const d=window.atob(b);return Uint8Array.from([...d].map(c=>c.charCodeAt(0)));}
function scheduleRandomPing(){
  const delay = (1 + Math.random()*3) * 60 * 60 * 1000; // 1~4시간
  setTimeout(async()=>{
    const pingOn = document.getElementById('toggle-ping')?.classList.contains('on');
    if(!pingOn){scheduleRandomPing();return;}

    const ch = getChar();
    const lv = getLevel();
    const name = charData?.char_name || '톡다리';

    // 레벨/캐릭터별 선톡 메시지
    let pings;
    if(lv <= 1){
      pings = ['...🥚','(아직 알 속이야)'];
    } else if(lv <= 2){
      pings = ['삐약...! 나 여기 있어','빨리 와줘'];
    } else if(ch?.id === 'A'){
      pings = ['야야야 나 생각났어ㅋㅋ','뭐해? 나 심심한데','오늘 어땠어? 빨리 말해봐','ㅋㅋ 나 또 왔어','야 나야'];
    } else if(ch?.id === 'B'){
      pings = ['...괜찮아?','생각나서','오늘 밥은 먹었어','잘 지내?'];
    } else {
      pings = ['어 살아있어?','요즘 뭐하냐고','할말있는데','심심하면 와'];
    }

    const msg = pings[Math.floor(Math.random()*pings.length)];

    // 앱이 백그라운드일 때 — 푸시 알림
    if(document.hidden && Notification.permission === 'granted'){
      new Notification(name, {
        body: msg,
        icon: '/icon.png',
        badge: '/icon.png',
        vibrate: [200, 100, 200]
      });
    }

    // 앱이 열려있을 때 — 채팅창에 메시지 + 토스트
    if(!document.hidden && currentUser){
      const chatOpen = document.getElementById('chat-screen')?.classList.contains('active');
      if(chatOpen){
        appendMsg('ai', msg);
        messages.push({role:'assistant', content:msg, created_at:new Date().toISOString()});
        await saveMsg('assistant', msg);
      } else {
        showToast(`${name}: ${msg}`);
      }
    }

    scheduleRandomPing();
  }, delay);
}
// ══ 다이어리 ══
async function autoSaveDiary(){
  if(!messages.length||!currentUser)return;
  try{
    const today=new Date().toLocaleDateString('ko-KR');
    // 오늘 이미 저장됐는지 확인
    const{data:existing}=await sb.from('diary')
      .select('id').eq('user_id',currentUser.id)
      .gte('created_at',new Date().toISOString().slice(0,10))
      .maybeSingle();
    if(existing)return; // 오늘 이미 저장됨

    const resp=await fetch('/api/summarize',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages,date:today})
    });
    if(!resp.ok)return;
    const r=await resp.json();
    const text=(r.highlight?r.highlight+'\n\n':'')+r.summary;
    await sb.from('diary').insert({
      user_id:currentUser.id,
      mood:r.mood||'😊',
      content:text,
      created_at:new Date().toISOString()
    });
  }catch(e){console.error('다이어리 자동저장 오류:',e);}
}

async function loadDiary(){
  const body=document.getElementById('diary-body');
  if(!body||!currentUser)return;
  body.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.85rem;margin-top:2rem">불러오는 중...</div>';
  try{
    const{data}=await sb.from('diary').select('*')
      .eq('user_id',currentUser.id)
      .order('created_at',{ascending:false})
      .limit(30);
    if(!data||!data.length){
      body.innerHTML='<div style="text-align:center;color:var(--text3);font-size:.85rem;margin-top:2rem">아직 일기가 없어!<br>대화하면 자동으로 기록돼 😊</div>';
      return;
    }
    body.innerHTML=data.map(d=>{
      const date=new Date(d.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1rem">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:1.4rem">${d.mood||'😊'}</span>
          <span style="font-size:.78rem;color:var(--text3)">${date}</span>
        </div>
        <div style="font-size:.85rem;color:var(--text2);line-height:1.7;white-space:pre-wrap">${d.content||''}</div>
      </div>`;
    }).join('');
  }catch(e){
    body.innerHTML='<div style="text-align:center;color:#f87171;font-size:.85rem;margin-top:2rem">불러오기 실패ㅠ</div>';
  }
}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
